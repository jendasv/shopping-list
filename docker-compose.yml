services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: shopping_php
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: shopping_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8
    container_name: shopping_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopping
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: shopping_adminer
    restart: always
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  mysql_data: